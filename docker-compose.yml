version: '3.9'

services:
  backend:
    build: ./backend
    container_name: kh-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - kh-db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/kopernik_harvest.db
      - SECRET_KEY=change-this-in-production-min-32-chars
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: kh-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  kh-db:
